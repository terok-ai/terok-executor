# terok:container — this file is deployed into task containers, not used on the host.

identity = "kisski.academiccloud.de"
name = "KISSKI"
short_name = "kisski"
url = "https://chat-ai.academiccloud.de/"
protocol = "acp"
author_name = "Academic Cloud"
author_url = "https://academiccloud.de/"
publisher_name = "terok"
publisher_url = "https://github.com/terok-ai/terok"
type = "coding"
description = "OpenCode with KISSKI — AI services for German academia."
tags = []
run_command."*" = "kisski-acp"

help = '''
# KISSKI

OpenCode powered by KISSKI — AI services hosted at Academic Cloud for
German research and academia.

Uses the same tools and capabilities as OpenCode, but routes through the
KISSKI API.

Requires KISSKI_API_KEY to be set.
'''

[actions."*".install]
command = "echo 'KISSKI is pre-installed in terok containers.'"
description = "Already installed"
