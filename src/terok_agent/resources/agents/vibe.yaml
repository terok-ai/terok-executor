kind: agent
label: Mistral Vibe
binary: vibe
tier: 1

git_identity:
  name: Vibe
  email: noreply@mistral.ai

headless:
  prompt_flag: "--prompt"
  model_flag: "--agent"
  max_turns_flag: "--max-turns"

auto_approve:
  env:
    VIBE_AUTO_APPROVE: "true"

session:
  supports_resume: true
  resume_flag: "--resume"
  continue_flag: "--continue"
  session_file: vibe-session.txt

capabilities:
  log_format: plain

auth:
  host_dir: _vibe-config
  container_mount: /home/dev/.vibe
  auth_key:
    label: Mistral
    key_url: https://console.mistral.ai/api-keys
    env_var: MISTRAL_API_KEY
    config_path: ~/.vibe/.env
    printf_template: "MISTRAL_API_KEY=%s"
    tool_name: vibe
  banner_hint: |-
    You will be prompted to enter your Mistral API key.
    Get your API key at: https://console.mistral.ai/api-keys
