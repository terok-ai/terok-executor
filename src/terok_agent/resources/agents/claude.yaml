kind: native
label: Claude
binary: claude

git_identity:
  name: Claude
  email: noreply@anthropic.com

headless:
  prompt_flag: "-p"
  output_format_flags: ["--output-format", "stream-json"]
  model_flag: "--model"
  max_turns_flag: "--max-turns"
  verbose_flag: "--verbose"

auto_approve:
  env: {}
  flags: []

session:
  supports_resume: true
  resume_flag: "--resume"
  supports_hook: true

capabilities:
  agents_json: true
  add_dir: true
  log_format: claude-stream-json

credential_proxy:
  route_prefix: claude
  upstream: https://api.anthropic.com
  auth_header: Authorization
  auth_prefix: "Bearer "
  credential_type: oauth
  credential_file: .credentials.json
  phantom_env:
    ANTHROPIC_API_KEY: true
  base_url_env: ANTHROPIC_BASE_URL

auth:
  host_dir: _claude-config
  container_mount: /home/dev/.claude
  command: ["claude"]
  banner_hint: |-
    Claude will guide you through authentication (OAuth or API key).
    After completing auth, exit Claude with /exit or Ctrl+C.
