kind: bridge
label: OpenCode
binary: opencode

git_identity:
  name: OpenCode
  email: noreply@opencode.ai

headless:
  subcommand: run
  prompt_flag: ""
  model_flag: "--model"

auto_approve:
  env:
    OPENCODE_PERMISSION: '{"*":"allow"}'

session:
  supports_resume: true
  resume_flag: "--session"
  continue_flag: "--continue"
  session_file: opencode-session.txt

capabilities:
  log_format: plain

# Shared state dirs for OpenCode runtime (persist across container runs).
# Defined here once — the registry deduplicates by host_dir, so all
# OpenCode-based agents (blablador, kisski) get these mounts without
# repeating them in their own YAML files.
mounts:
  - host_dir: _opencode-config
    container_path: /home/dev/.config/opencode
    label: OpenCode config
  - host_dir: _opencode-data
    container_path: /home/dev/.local/share/opencode
    label: OpenCode data
  - host_dir: _opencode-state
    container_path: /home/dev/.local/state
    label: OpenCode state
