roster_version: 1

kind: native
label: Mistral Vibe
binary: vibe

git_identity:
  name: Vibe
  email: noreply@mistral.ai

headless:
  prompt_flag: "--prompt"
  model_flag: "--agent"
  max_turns_flag: "--max-turns"

auto_approve:
  env:
    VIBE_AUTO_APPROVE: "true"

session:
  supports_resume: true
  resume_flag: "--resume"
  continue_flag: "--continue"
  session_file: vibe-session.txt

capabilities:
  log_format: plain

vault:
  route_prefix: vibe
  upstream: https://api.mistral.ai
  auth_header: Authorization
  auth_prefix: "Bearer "
  credential_type: api_key
  credential_file: .env
  phantom_env:
    MISTRAL_API_KEY: true
  shared_config_patch:
    file: config.toml
    toml_table: providers
    toml_match: {name: mistral}
    toml_set: {api_base: "{proxy_url}/v1"}

auth:
  host_dir: _vibe-config
  container_mount: /home/dev/.vibe
  modes: [api_key]
  api_key_hint: "Get your API key at: https://console.mistral.ai/api-keys"

install:
  run_as_root: |
    RUN set -eux; \
        cp /tmp/terok-scripts/terok-vibe-acp /usr/local/bin/terok-vibe-acp; \
        cp /tmp/terok-scripts/vibe-model-sync.sh /usr/local/bin/vibe-model-sync; \
        cp /tmp/terok-scripts/mistral-model-sync.py /usr/local/bin/mistral-model-sync.py; \
        chmod +x /usr/local/bin/terok-vibe-acp \
                 /usr/local/bin/vibe-model-sync \
                 /usr/local/bin/mistral-model-sync.py; \
        pipx install mistral-vibe; \
        pipx inject mistral-vibe mistralai

help:
  label: '  \033[36mvibe\033[0m       - Mistral Vibe CLI'
