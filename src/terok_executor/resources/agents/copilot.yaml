kind: native
label: GitHub Copilot
binary: copilot

git_identity:
  name: Copilot
  email: noreply@github.com

headless:
  prompt_flag: "-p"
  model_flag: "--model"

auto_approve:
  env:
    COPILOT_ALLOW_ALL: "true"

session:
  supports_resume: false

capabilities:
  log_format: plain
