kind: opencode
label: KISSKI
binary: kisski

git_identity:
  name: KISSKI
  email: noreply@academiccloud.de

headless:
  subcommand: run
  prompt_flag: ""

auto_approve:
  env:
    OPENCODE_PERMISSION: '{"*":"allow"}'

session:
  supports_resume: true
  resume_flag: "--session"
  continue_flag: "--continue"
  session_file: kisski-session.txt

capabilities:
  log_format: plain

vault:
  route_prefix: kisski
  upstream: https://chat-ai.academiccloud.de
  auth_header: Authorization
  auth_prefix: "Bearer "
  credential_type: api_key
  credential_file: config.json
  phantom_env:
    KISSKI_API_KEY: true

opencode:
  display_name: KISSKI
  base_url: https://chat-ai.academiccloud.de/v1
  preferred_model: devstral-2-123b-instruct-2512
  fallback_model: mistral-large-3-675b-instruct-2512
  env_var_prefix: KISSKI
  config_dir: .kisski
  auth_key_url: https://chat-ai.academiccloud.de/

# OpenCode runtime mounts are defined in opencode.yaml and deduplicated
# by the registry — no need to repeat them here.

install:
  depends_on: [opencode]
  run_as_root: |
    RUN set -eux; \
        ln -sf opencode-provider     /usr/local/bin/kisski; \
        ln -sf opencode-provider-acp /usr/local/bin/kisski-acp; \
        ln -sf opencode-toad         /usr/local/bin/kisskitoad

help:
  label: '  \033[36mkisski\033[0m     - OpenCode with KISSKI'
