roster_version: 1

kind: native
label: Claude
binary: claude

git_identity:
  name: Claude
  email: noreply@anthropic.com

headless:
  prompt_flag: "-p"
  output_format_flags: ["--output-format", "stream-json"]
  model_flag: "--model"
  max_turns_flag: "--max-turns"
  verbose_flag: "--verbose"

auto_approve:
  env: {}
  flags: []

session:
  supports_resume: true
  resume_flag: "--resume"
  supports_hook: true

capabilities:
  agents_json: true
  add_dir: true
  log_format: claude-stream-json

# Login is performed on the host via `terok auth claude` (writes a phantom
# token into the vault). In-container login would taint the host-shared
# mount and break credential containment (terok-ai/terok#873). The egress
# firewall blocks the OAuth handshake regardless; this guard is a friendly
# UX layer that fails fast with a clear message.
wrapper:
  refuse_subcommands: [setup-token]

vault:
  route_prefix: claude
  upstream: https://api.anthropic.com
  # Auth header is dynamic: OAuth uses "Authorization: Bearer <token>",
  # API key uses "x-api-key: <key>". The vault selects based on the
  # credential type stored in the DB.
  auth_header: dynamic
  auth_prefix: ""
  oauth_extra_headers:
    anthropic-beta: oauth-2025-04-20
  credential_type: oauth
  credential_file: .credentials.json
  # OAuth token refresh -- endpoint and client_id extracted from Claude Code
  # v2.1.86 (cli.js bundle). Scopes match the refresh grant in that version.
  # These are undocumented internals and may change with Claude Code releases.
  oauth_refresh:
    token_url: https://platform.claude.com/v1/oauth/token
    client_id: 9d1c250a-e61b-44d9-88ed-5944d1962f5e
    scope: "user:profile user:inference user:sessions:claude_code user:mcp_servers user:file_upload"
  phantom_env:
    ANTHROPIC_API_KEY: true
  oauth_phantom_env:
    CLAUDE_CODE_OAUTH_TOKEN: true
  base_url_env: ANTHROPIC_BASE_URL
  socket_env: ANTHROPIC_UNIX_SOCKET

auth:
  host_dir: _claude-config
  container_mount: /home/dev/.claude
  modes: [oauth, api_key]          # oauth requires container, api_key is fast-path
  command: ["claude"]               # only used for oauth mode
  banner_hint: |-
    Claude will guide you through authentication (OAuth or API key).
    After completing auth, exit Claude with /exit or Ctrl+C.
  api_key_hint: "Get your API key at: https://console.anthropic.com/settings/keys"
  post_capture_state:               # JSON state merged into auth mount after capture
    .claude.json:
      hasCompletedOnboarding: true

install:
  # /etc/claude-code is the managed-config directory for per-task permission
  # mode; init-ssh-and-repo.sh writes here when TEROK_UNRESTRICTED=1.
  run_as_root: |
    RUN set -eux; \
        cp /tmp/terok-scripts/terok-claude-acp /usr/local/bin/terok-claude-acp; \
        chmod +x /usr/local/bin/terok-claude-acp; \
        mkdir -p /etc/claude-code && chown dev:dev /etc/claude-code
  # The claude-agent-acp npm package backs the terok-claude-acp wrapper
  # (needed for ACP clients like Toad and Zed to drive Claude).
  run_as_dev: |
    RUN set -eux; \
        npm install -g @agentclientprotocol/claude-agent-acp; \
        npm cache clean --force
    RUN curl -fsSL https://claude.ai/install.sh | bash
    # ``claude-agent-acp`` looks for the Claude Code native binary at
    # a path inside its own bundled SDK subpackage — the platform-
    # specific ``@anthropic-ai/claude-agent-sdk-linux-x64`` ships the
    # directory but not the binary, so a fresh container hits
    # ``Claude Code native binary not found …`` the first time the
    # client calls ``session/new``.  ``claude.ai/install.sh`` above
    # has already placed a working claude in ``$HOME/.local/bin/``;
    # symlink it where the SDK expects it so any ACP client can drive
    # the wrapper without each having to set ``options.pathToClaudeCodeExecutable``.
    RUN set -eux; \
        SDK_BIN_DIR="$HOME/.npm-packages/lib/node_modules/@agentclientprotocol/claude-agent-acp/node_modules/@anthropic-ai/claude-agent-sdk-linux-x64"; \
        test -d "$SDK_BIN_DIR"; \
        test -x "$HOME/.local/bin/claude"; \
        ln -sf "$HOME/.local/bin/claude" "$SDK_BIN_DIR/claude"

help:
  label: '  \033[36mclaude\033[0m     - Claude Code CLI'
