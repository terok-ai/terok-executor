kind: tool
label: GitLab CLI
binary: glab

credential_proxy:
  route_prefix: gl
  upstream: https://gitlab.com
  auth_header: PRIVATE-TOKEN
  auth_prefix: ""
  credential_type: pat
  credential_file: config.yml
  phantom_env:
    GITLAB_TOKEN: true

auth:
  host_dir: _glab-config
  container_mount: /home/dev/.config/glab-cli
  modes: [api_key]
  api_key_hint: "Create a personal access token at: https://gitlab.com/-/user_settings/personal_access_tokens"
