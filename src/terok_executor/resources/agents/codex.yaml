roster_version: 1

kind: native
label: Codex
binary: codex

git_identity:
  name: Codex
  email: noreply@openai.com

headless:
  subcommand: exec
  prompt_flag: ""
  model_flag: "--model"

auto_approve:
  flags: ["--yolo"]

session:
  supports_resume: false

capabilities:
  log_format: plain

vault:
  route_prefix: codex
  upstream: https://api.openai.com
  path_upstreams:
    /backend-api/: https://chatgpt.com
  auth_header: Authorization
  auth_prefix: "Bearer "
  credential_type: oauth
  credential_file: auth.json
  shared_config_patch:
    file: config.toml
    toml_set:
      openai_base_url: "{vault_url}/v1"
      chatgpt_base_url: "{vault_url}/backend-api/"
  # OAuth refresh -- endpoint, client_id, and grant shape extracted from the
  # Codex CLI source (codex-rs/login/src/auth/manager.rs v0.123.0).  The CLI
  # itself can be redirected at its own refresh attempts via the
  # CODEX_REFRESH_TOKEN_URL_OVERRIDE env var, but vault-side refresh is what
  # actually keeps the stored credential fresh across task containers.
  oauth_refresh:
    token_url: https://auth.openai.com/oauth/token
    client_id: app_EMoamEEZ73f0CkXaXp7hrann

auth:
  host_dir: _codex-config
  container_mount: /home/dev/.codex
  modes: [oauth, api_key]
  command: ["setup-codex-auth.sh"]
  banner_hint: |-
    This will set up port forwarding (using socat) and open a browser for authentication.
    After completing authentication, press Ctrl+C to stop the container.
  extra_run_args: ["-p", "127.0.0.1:1455:1455"]
  api_key_hint: "Get your API key at: https://platform.openai.com/api-keys"

install:
  run_as_root: |
    RUN set -eux; \
        cp /tmp/terok-scripts/terok-codex-acp /usr/local/bin/terok-codex-acp; \
        cp /tmp/terok-scripts/setup-codex-auth.sh /usr/local/bin/setup-codex-auth.sh; \
        chmod +x /usr/local/bin/terok-codex-acp /usr/local/bin/setup-codex-auth.sh
  run_as_dev: |
    RUN set -eux; \
        npm install -g @openai/codex; \
        npm cache clean --force

help:
  label: '  \033[36mcodex\033[0m      - OpenAI Codex CLI'
