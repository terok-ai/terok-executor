kind: native
label: Codex
binary: codex

git_identity:
  name: Codex
  email: noreply@openai.com

headless:
  subcommand: exec
  prompt_flag: ""
  model_flag: "--model"

auto_approve:
  flags: ["--yolo"]

session:
  supports_resume: false

capabilities:
  log_format: plain

credential_proxy:
  route_prefix: codex
  upstream: https://api.openai.com
  auth_header: Authorization
  auth_prefix: "Bearer "
  credential_type: oauth
  credential_file: auth.json
  phantom_env:
    OPENAI_API_KEY: true
  base_url_env: OPENAI_BASE_URL

auth:
  host_dir: _codex-config
  container_mount: /home/dev/.codex
  modes: [oauth, api_key]
  command: ["setup-codex-auth.sh"]
  banner_hint: |-
    This will set up port forwarding (using socat) and open a browser for authentication.
    After completing authentication, press Ctrl+C to stop the container.
  extra_run_args: ["-p", "127.0.0.1:1455:1455"]
  api_key_hint: "Get your API key at: https://platform.openai.com/api-keys"
