kind: opencode
label: Blablador
binary: blablador

git_identity:
  name: Blablador
  email: noreply@hzdr.de

headless:
  subcommand: run
  prompt_flag: ""

auto_approve:
  env:
    OPENCODE_PERMISSION: '{"*":"allow"}'

session:
  supports_resume: true
  resume_flag: "--session"
  continue_flag: "--continue"
  session_file: blablador-session.txt

capabilities:
  log_format: plain

credential_proxy:
  route_prefix: blablador
  upstream: https://api.helmholtz-blablador.fz-juelich.de
  auth_header: Authorization
  auth_prefix: "Bearer "
  credential_type: api_key
  credential_file: config.json
  phantom_env:
    BLABLADOR_API_KEY: true

opencode:
  display_name: Helmholtz Blablador
  base_url: https://api.helmholtz-blablador.fz-juelich.de/v1
  preferred_model: alias-huge
  fallback_model: alias-code
  env_var_prefix: BLABLADOR
  config_dir: .blablador
  auth_key_url: https://codebase.helmholtz.cloud/-/user_settings/personal_access_tokens

# OpenCode runtime mounts are defined in opencode.yaml and deduplicated
# by the registry — no need to repeat them here.
