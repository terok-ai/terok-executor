exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Module Boundaries ───────────────────────────────────────────────
#
# Four domain packages + foundation + CLI surface:
#   roster/      — agent catalog (YAML loading, config resolution)
#   provider/    — AI provider behavior (headless, wrappers, instructions)
#   container/   — container lifecycle (build, env, run)
#   credentials/ — authentication, extraction, credential proxy

# ── Foundation ──────────────────────────────────────────────────────

# Path resolution — standalone XDG/FHS helpers
[[modules]]
path = "terok_agent.paths"
depends_on = []

# Vendored utilities — standalone, no internal deps
[[modules]]
path = "terok_agent._util"
depends_on = []

# Bundled resources — data files
[[modules]]
path = "terok_agent.resources"
depends_on = []

# ── roster/ — agent catalog ─────────────────────────────────────────

# YAML agent roster — loads bundled + user agent definitions
[[modules]]
path = "terok_agent.roster.loader"
depends_on = [
    "terok_agent._util",
    "terok_agent.credentials.auth",
    "terok_agent.provider.providers",
]

# Roster package waypoint (re-exports from loader)
[[modules]]
path = "terok_agent.roster"
depends_on = [
    "terok_agent.roster.loader",
]

# ── provider/ — AI provider behavior ────────────────────────────────

# Provider-aware config value extraction
[[modules]]
path = "terok_agent.provider.config"
depends_on = []

# Agent provider definitions + registry
[[modules]]
path = "terok_agent.provider.providers"
depends_on = []

# Shell wrapper generation
[[modules]]
path = "terok_agent.provider.wrappers"
depends_on = [
    "terok_agent.provider.providers",
]

# Headless command construction + config resolution
[[modules]]
path = "terok_agent.provider.headless"
depends_on = [
    "terok_agent.provider.config",
    "terok_agent.provider.providers",
]

# Instruction resolution
[[modules]]
path = "terok_agent.provider.instructions"
depends_on = [
    "terok_agent.provider.config",
]

# Agent config dir preparation + wrapper generation
[[modules]]
path = "terok_agent.provider.agents"
depends_on = [
    "terok_agent._util",
    "terok_agent.provider.providers",
    "terok_agent.provider.wrappers",
]

# ── container/ — container lifecycle ────────────────────────────────

# Build resource staging — standalone
[[modules]]
path = "terok_agent.container.build"
depends_on = []

# Clone-cache workspace seeding — copies cached clone into task workspace
[[modules]]
path = "terok_agent.container.cache"
depends_on = []

# Container environment assembly — single source of truth for env + volumes
[[modules]]
path = "terok_agent.container.env"
depends_on = [
    "terok_agent.paths",
]

# Agent runner facade — composes sandbox + agent config + container launch
[[modules]]
path = "terok_agent.container.runner"
depends_on = [
    "terok_agent.container.build",
    "terok_agent.container.cache",
    "terok_agent.container.env",
    "terok_agent.paths",
    "terok_agent.provider.agents",
    "terok_agent.provider.headless",
    "terok_agent.provider.instructions",
    "terok_agent.roster.loader",
]

# ── credentials/ — authentication + credential proxy ────────────────

# Credential extractors — per-provider credential file parsers
[[modules]]
path = "terok_agent.credentials.extractors"
depends_on = []

# Auth flows
[[modules]]
path = "terok_agent.credentials.auth"
depends_on = [
    "terok_agent._util",
    "terok_agent.credentials.extractors",
    "terok_agent.paths",
]

# Post-auth shared config patching (proxy URL writes)
[[modules]]
path = "terok_agent.credentials.proxy_config"
depends_on = [
    "terok_agent.paths",
    "terok_agent.roster.loader",
]

# Credential proxy CLI commands — wraps sandbox lifecycle + route generation
[[modules]]
path = "terok_agent.credentials.proxy_commands"
depends_on = [
    "terok_agent.paths",
    "terok_agent.roster.loader",
]

# ── CLI surface ────────────────────────────────────────────────────

# Command registry — defines all CLI commands
[[modules]]
path = "terok_agent.commands"
depends_on = [
    "terok_agent.container.build",
    "terok_agent.container.runner",
    "terok_agent.credentials.auth",
    "terok_agent.credentials.proxy_config",
    "terok_agent.paths",
    "terok_agent.roster.loader",
]

# CLI entry point — wires command registry to argparse
[[modules]]
path = "terok_agent.cli"
depends_on = [
    "terok_agent.commands",
    "terok_agent.credentials.proxy_commands",
]

# Agent-level container health checks
[[modules]]
path = "terok_agent.doctor"
depends_on = []

# Package root — public API re-exports + roster bootstrap
[[modules]]
path = "terok_agent"
depends_on = [
    "terok_agent.commands",
    "terok_agent.container.build",
    "terok_agent.container.cache",
    "terok_agent.container.env",
    "terok_agent.container.runner",
    "terok_agent.credentials.auth",
    "terok_agent.credentials.extractors",
    "terok_agent.credentials.proxy_commands",
    "terok_agent.doctor",
    "terok_agent.paths",
    "terok_agent.provider.agents",
    "terok_agent.provider.config",
    "terok_agent.provider.headless",
    "terok_agent.provider.instructions",
    "terok_agent.provider.providers",
    "terok_agent.roster",
]
