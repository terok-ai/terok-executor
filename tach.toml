exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Module Boundaries ───────────────────────────────────────────────
#
# Four domain packages + foundation + CLI surface:
#   roster/      — agent catalog (YAML loading, config resolution)
#   provider/    — AI provider behavior (headless, wrappers, instructions)
#   container/   — container lifecycle (build, env, run)
#   credentials/ — authentication, extraction, vault

# ── Foundation ──────────────────────────────────────────────────────

# Path resolution — standalone XDG/FHS helpers
[[modules]]
path = "terok_executor.paths"
depends_on = []

# Vendored utilities — standalone, no internal deps
[[modules]]
path = "terok_executor._util"
depends_on = []

# Bundled resources — data files
[[modules]]
path = "terok_executor.resources"
depends_on = []

# Container-side vault addressing constants — shared by env builder,
# config patcher, and doctor.  Depends only on terok_sandbox (external).
[[modules]]
path = "terok_executor.vault_addr"
depends_on = []

# ── roster/ — agent catalog ─────────────────────────────────────────

# Runtime dataclasses — pure data, zero deps
[[modules]]
path = "terok_executor.roster.types"
depends_on = []

# Pydantic schema — strict YAML validation, projects onto runtime dataclasses
[[modules]]
path = "terok_executor.roster.schema"
depends_on = [
    "terok_executor.credentials.auth",
    "terok_executor.provider.providers",
    "terok_executor.roster.types",
]

# YAML agent roster — loads bundled + user agent definitions, drives the schema
[[modules]]
path = "terok_executor.roster.loader"
depends_on = [
    "terok_executor._util",
    "terok_executor.credentials.auth",
    "terok_executor.provider.providers",
    "terok_executor.roster.schema",
    "terok_executor.roster.types",
]

# Roster package waypoint (re-exports from loader)
[[modules]]
path = "terok_executor.roster"
depends_on = [
    "terok_executor.roster.loader",
]

# ── provider/ — AI provider behavior ────────────────────────────────

# Provider-aware config value extraction
[[modules]]
path = "terok_executor.provider.config"
depends_on = []

# Agent provider definitions + registry
[[modules]]
path = "terok_executor.provider.providers"
depends_on = []

# Shell wrapper generation
[[modules]]
path = "terok_executor.provider.wrappers"
depends_on = [
    "terok_executor.provider.providers",
]

# Headless command construction + config resolution
[[modules]]
path = "terok_executor.provider.headless"
depends_on = [
    "terok_executor.provider.config",
    "terok_executor.provider.providers",
]

# Instruction resolution
[[modules]]
path = "terok_executor.provider.instructions"
depends_on = [
    "terok_executor.provider.config",
]

# Agent config dir preparation + wrapper generation
[[modules]]
path = "terok_executor.provider.agents"
depends_on = [
    "terok_executor._util",
    "terok_executor.provider.providers",
    "terok_executor.provider.wrappers",
]

# ── container/ — container lifecycle ────────────────────────────────

# Build resource staging — standalone
[[modules]]
path = "terok_executor.container.build"
depends_on = [
    "terok_executor.roster.loader",
]

# Clone-cache workspace seeding — copies cached clone into task workspace
[[modules]]
path = "terok_executor.container.cache"
depends_on = []

# Container environment assembly — single source of truth for env + volumes
[[modules]]
path = "terok_executor.container.env"
depends_on = [
    "terok_executor._util",
    "terok_executor.credentials.vault_commands",
    "terok_executor.credentials.vault_config",
    "terok_executor.paths",
    "terok_executor.vault_addr",
]

# Agent runner facade — composes sandbox + agent config + container launch
[[modules]]
path = "terok_executor.container.runner"
depends_on = [
    "terok_executor._util",
    "terok_executor.container.build",
    "terok_executor.container.cache",
    "terok_executor.container.env",
    "terok_executor.paths",
    "terok_executor.provider.agents",
    "terok_executor.provider.headless",
    "terok_executor.provider.instructions",
    "terok_executor.roster.loader",
]

# ── credentials/ — authentication + vault ────────────────

# Vendor file shapes — Pydantic models describing the third-party credential
# files we read (Anthropic, OpenAI, GitHub, GitLab, OpenAI-compatible JSONs).
# Lax (extra="ignore"); zero internal deps.
[[modules]]
path = "terok_executor.credentials.vendor_files"
depends_on = []

# Credential extractors — per-provider credential file parsers
[[modules]]
path = "terok_executor.credentials.extractors"
depends_on = [
    "terok_executor.credentials.vendor_files",
]

# Auth flows
[[modules]]
path = "terok_executor.credentials.auth"
depends_on = [
    "terok_executor._util",
    "terok_executor.credentials.extractors",
    "terok_executor.paths",
]

# Post-auth shared config patching (vault URL writes)
[[modules]]
path = "terok_executor.credentials.vault_config"
depends_on = [
    "terok_executor.paths",
    "terok_executor.roster.loader",
    "terok_executor.vault_addr",
]

# Credential proxy CLI commands — wraps sandbox lifecycle + route generation
[[modules]]
path = "terok_executor.credentials.vault_commands"
depends_on = [
    "terok_executor.credentials.vendor_files",
    "terok_executor.paths",
    "terok_executor.roster.loader",
]

# ── Sandbox bootstrap composition ──────────────────────────────────

# Routes + sandbox aggregator in one call.  Uninstall is pure
# delegation to the sandbox aggregator and doesn't live here.
[[modules]]
path = "terok_executor.sandbox"
depends_on = [
    "terok_executor.roster.loader",
]

# ── ACP host-proxy (per-task aggregator) ──────────────────────────

# Host-side ACP proxy: aggregates multi-agent containers behind one
# socket by namespacing the model selector as ``agent:model``.  Sibling
# of ``container`` (does not consume runner) — so adding ACP can never
# pull the runner along by accident.
[[modules]]
path = "terok_executor.acp"
depends_on = [
    "terok_executor.container.build",
]

# ── Preflight — prerequisite checks ────────────────────────────────

# Pre-launch checks + interactive fixers for `terok-executor run`
[[modules]]
path = "terok_executor.preflight"
depends_on = [
    "terok_executor.container.build",
    "terok_executor.credentials.auth",
    "terok_executor.credentials.vault_config",
    "terok_executor.paths",
    "terok_executor.roster.loader",
    "terok_executor.sandbox",
]

# ── CLI surface ────────────────────────────────────────────────────

# Command registry — defines all CLI commands
[[modules]]
path = "terok_executor.commands"
depends_on = [
    "terok_executor.acp",
    "terok_executor.container.build",
    "terok_executor.container.runner",
    "terok_executor.credentials.auth",
    "terok_executor.credentials.vault_config",
    "terok_executor.paths",
    "terok_executor.preflight",
    "terok_executor.roster.loader",
    "terok_executor.sandbox",
]

# CLI entry point — wires command registry to argparse
[[modules]]
path = "terok_executor.cli"
depends_on = [
    "terok_executor.commands",
    "terok_executor.credentials.vault_commands",
]

# Agent-level container health checks
[[modules]]
path = "terok_executor.doctor"
depends_on = [
    "terok_executor.vault_addr",
]

# Package root — public API re-exports + roster bootstrap
[[modules]]
path = "terok_executor"
depends_on = [
    "terok_executor.acp",
    "terok_executor.commands",
    "terok_executor.container.build",
    "terok_executor.container.cache",
    "terok_executor.container.env",
    "terok_executor.container.runner",
    "terok_executor.credentials.auth",
    "terok_executor.credentials.extractors",
    "terok_executor.credentials.vault_commands",
    "terok_executor.credentials.vault_config",
    "terok_executor.doctor",
    "terok_executor.paths",
    "terok_executor.provider.agents",
    "terok_executor.provider.config",
    "terok_executor.provider.headless",
    "terok_executor.provider.instructions",
    "terok_executor.provider.providers",
    "terok_executor.roster",
    "terok_executor.sandbox",
]
