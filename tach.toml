exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Module Boundaries ───────────────────────────────────────────────
#
# Dependency flow:
#   _util (standalone) ← config_stack ← {agent_config, instructions, agents}
#   headless_providers (standalone, pure dataclasses)
#   agents → _util + headless_providers
#   auth → _util + headless_providers
#   instructions → agent_config
#   resources (data files, no code deps)

# Vendored utilities — standalone, no internal deps
[[modules]]
path = "terok_agent._util"
depends_on = []

# Bundled resources — data files
[[modules]]
path = "terok_agent.resources"
depends_on = []

# Headless provider registry + dispatch
[[modules]]
path = "terok_agent.headless_providers"
depends_on = [
    "terok_agent.agent_config",
]

# Config stack — generic layered resolution
[[modules]]
path = "terok_agent.config_stack"
depends_on = [
    "terok_agent._util",
]

# Provider-aware config value extraction
[[modules]]
path = "terok_agent.agent_config"
depends_on = []

# Instruction resolution (resources accessed via importlib.resources, not import)
[[modules]]
path = "terok_agent.instructions"
depends_on = [
    "terok_agent.agent_config",
]

# Agent config dir preparation + wrapper generation
[[modules]]
path = "terok_agent.agents"
depends_on = [
    "terok_agent._util",
    "terok_agent.headless_providers",
]

# Auth flows
[[modules]]
path = "terok_agent.auth"
depends_on = [
    "terok_agent._util",
    "terok_agent.credential_extractors",
]

# YAML agent registry — loads bundled + user agent definitions
[[modules]]
path = "terok_agent.registry"
depends_on = [
    "terok_agent._util",
    "terok_agent.auth",
    "terok_agent.config_stack",
    "terok_agent.headless_providers",
]

# Credential extractors — per-provider credential file parsers
[[modules]]
path = "terok_agent.credential_extractors"
depends_on = []

# Build resource staging — standalone, reads from resources only
[[modules]]
path = "terok_agent.build"
depends_on = []

# Agent runner facade — composes sandbox + agent config + container launch
[[modules]]
path = "terok_agent.runner"
depends_on = [
    "terok_agent.agents",
    "terok_agent.build",
    "terok_agent.headless_providers",
    "terok_agent.instructions",
    "terok_agent.registry",
]

# Command registry — defines all CLI commands
[[modules]]
path = "terok_agent.commands"
depends_on = [
    "terok_agent.auth",
    "terok_agent.build",
    "terok_agent.registry",
    "terok_agent.runner",
]

# CLI entry point — wires command registry to argparse
[[modules]]
path = "terok_agent.cli"
depends_on = [
    "terok_agent.commands",
]

# Package root — public API re-exports + registry bootstrap
[[modules]]
path = "terok_agent"
depends_on = [
    "terok_agent.agent_config",
    "terok_agent.agents",
    "terok_agent.auth",
    "terok_agent.build",
    "terok_agent.commands",
    "terok_agent.config_stack",
    "terok_agent.credential_extractors",
    "terok_agent.headless_providers",
    "terok_agent.instructions",
    "terok_agent.registry",
    "terok_agent.runner",
]
